<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in · Constrava</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,Arial,sans-serif;color:#0f172a;background:radial-gradient(circle at 18% 8%,rgba(16,185,129,.3),transparent 30%),linear-gradient(135deg,#f8fffc,#ecfdf5 52%,#fff)}.wrap{min-height:100vh;display:grid;place-items:center;padding:28px}.login{width:min(460px,100%);border:1px solid #dcebe5;border-radius:30px;background:rgba(255,255,255,.94);box-shadow:0 34px 100px rgba(2,44,34,.14);padding:32px}.brand{display:flex;align-items:center;gap:13px;font-weight:950;letter-spacing:.22em;color:#064e3b;margin-bottom:30px}.mark{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,#00f59b,#10b981);color:#022c22;display:grid;place-items:center;transform:skew(-10deg);font-weight:1000}h1{margin:0;color:#073d32;font-size:36px;letter-spacing:-.05em}p{color:#64748b;line-height:1.55;margin:10px 0 24px}.field{display:grid;gap:8px;margin-bottom:15px}label{font-size:13px;font-weight:900;color:#334155}input{width:100%;border:1px solid #d8e8e1;border-radius:16px;padding:14px 15px;background:#fff;outline:none}input:focus{border-color:#10b981;box-shadow:0 0 0 4px rgba(16,185,129,.12)}button{width:100%;min-height:52px;border:0;border-radius:16px;background:linear-gradient(135deg,#059669,#10b981);color:white;font-weight:950;box-shadow:0 20px 45px rgba(16,185,129,.24);cursor:pointer}button:disabled{opacity:.65;cursor:not-allowed}.row{display:flex;justify-content:space-between;margin-top:16px;font-size:14px}.row a{color:#047857;font-weight:900;text-decoration:none}.msg{display:none;margin:0 0 14px;padding:12px 13px;border-radius:14px;font-weight:800}.msg.show{display:block}.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}.ok{background:#ecfdf5;color:#065f46;border:1px solid #bbf7d0}
  </style>
</head>
<body>
  <main class="wrap">
    <form class="login" id="loginForm">
      <div class="brand"><div class="mark">∕∕</div><div>CONSTRAVA</div></div>
      <h1>Sign in</h1>
      <p>Open your private workspace.</p>
      <div class="msg error" id="errorBox"></div>
      <div class="msg ok" id="successBox">Signed in. Opening dashboard…</div>
      <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="username" required placeholder="Email address" /></div>
      <div class="field"><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Password" /></div>
      <button id="submitBtn" type="submit">Sign in</button>
      <div class="row"><a href="/welcome">Back</a><a href="/">Public site</a></div>
    </form>
  </main>
  <script>
    const CANONICAL_PRIVATE_URL = 'https://constravaai.com/';
    const CANONICAL_ORIGIN = 'https://constravaai.com';
    const params = new URLSearchParams(location.search);
    const rawReturnTo = params.get('returnTo') || CANONICAL_PRIVATE_URL;
    function canonicalReturnTo(value) {
      try {
        const url = new URL(String(value || CANONICAL_PRIVATE_URL), CANONICAL_ORIGIN);
        if (url.hostname === 'constrava-backend.onrender.com') {
          return CANONICAL_ORIGIN + url.pathname + url.search + url.hash;
        }
        if (url.hostname === 'constravaai.com' || url.hostname === 'www.constravaai.com') {
          return url.href;
        }
        return CANONICAL_PRIVATE_URL;
      } catch {
        return CANONICAL_PRIVATE_URL;
      }
    }
    const returnTo = canonicalReturnTo(rawReturnTo);
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    const submitBtn = document.getElementById('submitBtn');
    form.addEventListener('submit', async function(event) {
      event.preventDefault();
      errorBox.classList.remove('show');
      successBox.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';
      try {
        const response = await fetch('/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: form.email.value, password: form.password.value, returnTo }) });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || 'Sign in failed.');
        successBox.classList.add('show');
        location.href = canonicalReturnTo(data.returnTo || returnTo);
      } catch (error) {
        errorBox.textContent = error.message || 'Sign in failed.';
        errorBox.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
