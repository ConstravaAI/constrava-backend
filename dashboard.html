<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Constrava Dashboard</title>
  <link rel="canonical" href="https://constravaai.com/dashboard/" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@450;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    (function enforceCanonicalDashboardHost(){
      const canonicalOrigin = "https://constravaai.com";
      const legacyRenderHost = "constrava-backend.onrender.com";
      if (location.hostname === legacyRenderHost) {
        const params = new URLSearchParams(location.search);
        if (!params.get("mode")) params.set("mode", "private");
        location.replace(canonicalOrigin + "/dashboard/?" + params.toString());
      }
    })();
  </script>
  <style>
    :root {
      --green: #10b981;
      --green-dark: #047857;
      --dark: #022c22;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe8e4;
      --shadow: 0 18px 45px rgba(15, 23, 42, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 0, rgba(16,185,129,.18), transparent 34%),
        linear-gradient(135deg, #f8fffc, #eefaf5 45%, #fff);
    }
    button { font: inherit; cursor: pointer; }

    .app {
      display: grid;
      grid-template-columns: 292px 1fr;
      min-height: 100vh;
    }

    .side {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 28px 22px;
      color: #eafff7;
      background: linear-gradient(180deg, #063f31, #03271f 62%, #021813);
      box-shadow: 20px 0 70px rgba(2,44,34,.22);
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 28px;
      font-weight: 900;
      letter-spacing: .24em;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      background: linear-gradient(135deg, #00f59b, #10b981);
      color: #022c22;
      display: grid;
      place-items: center;
      transform: skew(-10deg);
      font-weight: 1000;
    }

    .navbtn {
      width: 100%;
      border: 0;
      background: transparent;
      color: rgba(236,253,245,.88);
      border-radius: 15px;
      padding: 13px 14px;
      display: flex;
      gap: 10px;
      text-align: left;
      font-weight: 850;
    }

    .navbtn.active,
    .navbtn:hover {
      background: linear-gradient(90deg, rgba(16,185,129,.38), rgba(255,255,255,.1));
      box-shadow: inset 3px 0 0 #12f7a3;
    }

    .main { padding: 34px 26px; }
    .shell { max-width: 1560px; margin: auto; }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 18px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0;
      color: #073d32;
      font-size: clamp(32px, 3vw, 44px);
      letter-spacing: -.05em;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .status {
      border: 1px solid rgba(16,185,129,.26);
      border-radius: 14px;
      padding: 12px 16px;
      background: rgba(236,253,245,.75);
      color: #064e3b;
      font-weight: 900;
      white-space: nowrap;
    }

    .panel {
      min-height: 560px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,.72);
      box-shadow: var(--shadow);
    }

    .hidden { display: none !important; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .side { position: relative; height: auto; }
      .hero { display: block; }
      .main { padding: 24px 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand"><div class="mark">∕∕</div><div>CONSTRAVA</div></div>
      <button class="navbtn active" data-main="analytics">📈 Analytics</button>
      <button class="navbtn" data-main="crm">🧩 CRM</button>
    </aside>

    <main class="main">
      <div class="shell">
        <header class="hero">
          <div>
            <h1>Constrava Dashboard</h1>
            <p>Fresh dashboard shell. Analytics and CRM tab contents have been cleared.</p>
          </div>
          <div class="status" id="status">Status: clean shell</div>
        </header>

        <section id="analytics" class="panel"></section>
        <section id="crm" class="panel hidden"></section>
      </div>
    </main>
  </div>

  <script>
    function switchMain(main) {
      document.querySelectorAll('[data-main]').forEach(button => {
        button.classList.toggle('active', button.dataset.main === main);
      });
      document.getElementById('analytics').classList.toggle('hidden', main !== 'analytics');
      document.getElementById('crm').classList.toggle('hidden', main !== 'crm');
    }

    document.querySelectorAll('[data-main]').forEach(button => {
      button.addEventListener('click', () => switchMain(button.dataset.main));
    });
  </script>
</body>
</html>
