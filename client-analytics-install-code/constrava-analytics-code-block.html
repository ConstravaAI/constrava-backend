<!-- Constrava Analytics Install Code
     Place this once on every page, preferably right before </body>.
     Replace CLIENT_SITE_ID with the site ID from the Constrava dashboard. -->

<script>
  window.ConstravaAnalytics = window.ConstravaAnalytics || {
    siteId: "CLIENT_SITE_ID",
    mode: "standard",
    trackPageViews: true,
    trackClicks: true,
    trackForms: true,
    trackScrollDepth: true,
    respectDoNotTrack: true
  };
</script>
<script async src="https://constravaai.com/tracker.js" data-token="CLIENT_SITE_ID"></script>
