<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Constrava CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@450;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--top:#26394d;--rail:#0d1117;--blue:#2098d4;--green:#72d98b;--ink:#1f2937;--muted:#64748b;--line:#dde5ec;--soft:#f5f7f9;--card:#fff;--shadow:0 12px 30px rgba(15,23,42,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f3f5f7;color:var(--ink)}button,input,select{font:inherit}button{cursor:pointer}.app{min-height:100vh;display:grid;grid-template-columns:52px 225px 1fr}.rail{background:var(--rail);color:#dce3ea;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:14px}.dots{display:flex;gap:6px;margin:2px 0 8px}.dots i{width:9px;height:9px;border-radius:50%;background:#ff6159}.dots i:nth-child(2){background:#ffbd2e}.dots i:nth-child(3){background:#28c840}.rail button{width:42px;height:42px;border:0;background:transparent;color:#ccd4dc;border-left:3px solid transparent;font-size:18px}.rail button.active,.rail button:hover{background:#17202a;color:white;border-left-color:var(--blue)}.side{background:#fff;border-right:1px solid var(--line);padding:18px 14px;overflow:auto}.brand{font-weight:900;letter-spacing:.1em;color:#0f766e;margin-bottom:20px}.side h2{font-size:14px;margin:10px 8px;color:#111827}.search{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px;margin-bottom:14px}.side button{display:block;width:100%;border:0;background:transparent;text-align:left;padding:10px 9px;border-radius:6px;color:#334155}.side button.active,.side button:hover{background:#eaf6fd;color:#0b85be;font-weight:800}.main{min-width:0}.topbar{height:50px;background:var(--top);display:flex;align-items:center;gap:2px;padding:0 12px;color:white;position:sticky;top:0;z-index:4}.tab{border:0;background:transparent;color:#e5edf5;padding:16px 13px;height:50px}.tab.active,.tab:hover{background:#1a2d40}.top-spacer{flex:1}.iconbtn{border:0;background:transparent;color:white;font-size:17px;width:36px;height:36px}.content{padding:22px}.hero{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:14px}.hero h1{margin:0;font-size:25px}.hero p{margin:4px 0 0;color:var(--muted)}.actions{display:flex;gap:9px;flex-wrap:wrap}.primary,.light,.action{border:1px solid var(--line);background:white;border-radius:6px;padding:10px 13px;font-weight:800;box-shadow:0 2px 8px rgba(15,23,42,.04);text-decoration:none;color:var(--ink)}.primary{background:var(--blue);border-color:var(--blue);color:white}.action{padding:7px 10px;font-size:12px}.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}.toolbar input,.toolbar select{border:1px solid var(--line);border-radius:6px;padding:10px;background:white}.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:12px}.kpi{background:white;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:8px;padding:16px}.kpi span{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;font-weight:900;letter-spacing:.08em}.kpi strong{font-size:28px;display:block;margin:6px 0}.kpi em{font-style:normal;color:#0f9f6e;font-weight:800}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.panel{background:white;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);min-width:0}.panel-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}.panel h2{font-size:15px;margin:0}.panel-body{padding:16px;min-height:260px}.funnel{display:grid;gap:9px;align-content:center}.stage{height:48px;margin:auto;clip-path:polygon(0 0,100% 0,88% 100%,12% 100%);display:grid;place-items:center;font-weight:900;color:#064e3b}.bars{height:220px;display:flex;gap:16px;align-items:flex-end;justify-content:center;border-left:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;padding:12px}.bar{width:42px;border-radius:5px 5px 0 0;background:#22c55e;position:relative;min-height:10px}.bar span{position:absolute;top:-24px;left:0;right:0;text-align:center;font-size:12px;font-weight:900}.bar em{position:absolute;bottom:-24px;left:0;right:0;text-align:center;font-size:11px;color:var(--muted);font-style:normal}.donut-wrap{display:grid;grid-template-columns:180px 1fr;align-items:center;gap:20px}.donut{width:170px;height:170px;border-radius:50%;background:conic-gradient(#22c55e 0 24%,#06b6d4 24% 43%,#f59e0b 43% 62%,#ef4444 62% 76%,#8b5cf6 76% 88%,#14b8a6 88% 100%);position:relative}.donut:after{content:"";position:absolute;inset:45px;border-radius:50%;background:white}.legend{display:grid;gap:8px}.legend div{font-size:13px}.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:7px}.type-row{display:grid;grid-template-columns:120px 1fr 36px;gap:10px;align-items:center;margin:15px 0}.track{height:12px;background:#eef2f7;border-radius:20px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#73d98b,#16a34a)}.board{display:grid;grid-template-columns:repeat(5,minmax(190px,1fr));gap:12px;overflow:auto}.col{background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:10px;min-height:220px}.col h3{font-size:13px;text-transform:uppercase;color:#64748b;margin:3px 0 10px}.deal{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:11px;margin-bottom:9px}.deal strong,.deal span,.deal em{display:block}.deal span{color:var(--muted);font-size:12px;margin-top:4px}.deal em{font-style:normal;color:#047857;font-weight:900;margin-top:8px}.records{overflow:auto}.records table{width:100%;border-collapse:collapse}.records th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#64748b;text-align:left;padding:10px}.records td{border-top:1px solid #edf2f7;padding:12px;font-size:13px}.pill{display:inline-flex;background:#e8f8ef;color:#0f766e;border-radius:999px;padding:5px 8px;font-weight:900;font-size:12px}.record-grid{display:grid;grid-template-columns:1.6fr .55fr;gap:12px}.activity{display:grid;gap:10px}.activity-row{display:grid;grid-template-columns:40px 1fr auto;gap:10px;align-items:center;border:1px solid #e5e7eb;border-radius:8px;padding:10px;background:#fff}.bubble{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;background:#eaf6fd;color:#0b85be;font-weight:900}.toast{position:fixed;right:18px;bottom:18px;background:#17202a;color:white;border-radius:8px;padding:12px 14px;box-shadow:var(--shadow);opacity:0;transform:translateY(10px);transition:.2s;z-index:20}.toast.show{opacity:1;transform:translateY(0)}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;place-items:center;padding:20px;z-index:30}.modal.open{display:grid}.modal-card{background:white;border-radius:12px;box-shadow:0 25px 80px rgba(0,0,0,.25);padding:22px;max-width:560px}.modal-card h2{margin:0 0 8px}.modal-card p{line-height:1.6;color:#475569}@media(max-width:1050px){.app{grid-template-columns:1fr}.rail,.side{display:none}.topbar{overflow:auto}.kpis,.grid,.record-grid{grid-template-columns:1fr}.board{grid-template-columns:1fr}.donut-wrap{grid-template-columns:1fr}.hero{display:block}.actions{margin-top:12px}}
  </style>
</head>
<body>
  <div class="app">
    <nav class="rail"><div class="dots"><i></i><i></i><i></i></div><button class="active">∞</button><button>◎</button><button>◧</button><button>✓</button><button>✉</button><button>⚙</button></nav>
    <aside class="side"><div class="brand">CONSTRAVA CRM</div><h2>DASHBOARDS</h2><input id="search" class="search" placeholder="Search records"><button class="active" data-module="dashboards">Deal Dashboards</button><button data-module="leads">Lead Dashboards</button><button data-module="accounts">Account and Contact</button><button data-module="deals">Pipeline Board</button><button data-module="activities">Activities</button><button data-module="documents">Documents</button><button data-module="more">Reports</button></aside>
    <main class="main"><nav class="topbar"><button class="tab" data-module="feeds">Feeds</button><button class="tab" data-module="home">Home</button><button class="tab" data-module="leads">Leads</button><button class="tab" data-module="vip">VIP Leads</button><button class="tab" data-module="contacts">Contacts</button><button class="tab" data-module="accounts">Accounts</button><button class="tab" data-module="deals">Deals</button><button class="tab" data-module="activities">Activities</button><button class="tab active" data-module="dashboards">Dashboards</button><button class="tab" data-module="documents">Documents</button><button class="tab" data-module="more">•••</button><span class="top-spacer"></span><button class="iconbtn">⌕</button><button class="iconbtn">＋</button><button class="iconbtn">⚙</button></nav>
      <section class="content"><header class="hero"><div><h1 id="title">Deal Dashboards</h1><p id="subtitle">Zoho-style sales modules, pipelines, probability, activities, accounts, and dashboards.</p></div><div class="actions"><button class="primary" id="addBtn">Add Component</button><button class="light" id="refreshBtn">Refresh</button><button class="light" id="seedBtn">Seed Data</button><button class="light" id="explainBtn">AI Explain</button></div></header><div class="toolbar"><select id="stageFilter"><option value="all">All stages</option><option>New</option><option>Needs Analysis</option><option>Qualified</option><option>Proposal</option><option>Negotiation</option><option>Closed Won</option><option>Closed Lost</option></select><a class="light" id="exportBtn" href="#">Export CRM CSV</a><a class="light" id="jsonBtn" href="#">View JSON</a><span id="mode"></span></div><div id="content"></div></section>
    </main>
  </div>
  <div id="toast" class="toast">Ready</div><div id="modal" class="modal"><div class="modal-card"><h2>CRM insight</h2><p id="modalBody"></p><button class="primary" id="close">Close</button></div></div>
<script>
const params=new URLSearchParams(location.search);const token=params.get('token')||'demo';let data=null;let active='dashboards';let timer=null;const stages=['New','Needs Analysis','Qualified','Proposal','Negotiation','Closed Won','Closed Lost'];const probs={'New':10,'Needs Analysis':20,'Qualified':40,'Proposal':60,'Negotiation':80,'Closed Won':100,'Closed Lost':0};const colors=['#22c55e','#06b6d4','#f59e0b','#ef4444','#8b5cf6','#14b8a6'];
function demo(){return{ok:true,usingFallback:true,site:{site_name:'Constrava Demo'},leads:[{name:'Avery Morgan',email:'avery@example.com',company:'Northstar Studio',status:'Qualified',source:'Contact form',value:4800,notes:'Needs a client portal and analytics dashboard.'},{name:'Jordan Lee',email:'jordan@example.com',company:'Lee Manufacturing',status:'New',source:'Pricing CTA',value:3200,notes:'Interested in production tracking software.'},{name:'Sam Patel',email:'sam@example.com',company:'Patel Labs',status:'Proposal',source:'Referral',value:7400,notes:'Proposal sent for internal CRM.'},{name:'Mia Carter',email:'mia@example.com',company:'Carter Design',status:'Negotiation',source:'Search',value:6100,notes:'Asked for monthly support after launch.'},{name:'Leo Brooks',email:'leo@example.com',company:'Brooks HVAC',status:'Closed Won',source:'Direct',value:2500,notes:'Signed starter dashboard package.'},{name:'Nora Kim',email:'nora@example.com',company:'Kim Fitness',status:'Needs Analysis',source:'Social',value:3900,notes:'Needs booking and payment workflow.'},{name:'Owen Clark',email:'owen@example.com',company:'Clark Electric',status:'Qualified',source:'Search',value:5300,notes:'Wants job tracking and invoice exports.'}]}}
function id(x){return document.getElementById(x)}function money(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(n||0))}function fmt(n){return new Intl.NumberFormat('en-US').format(Math.round(Number(n||0)))}function e(v){return String(v==null?'':v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function toast(m){const t=id('toast');t.textContent=m;t.classList.add('show');clearTimeout(timer);timer=setTimeout(()=>t.classList.remove('show'),2300)}function normalize(){return (data.leads||[]).map((l,i)=>{const s=l.status||l.stage||'New';return{...l,stage:s,probability:probs[s]||25,value:Number(l.value||2200+i*800)}})}function filtered(){const term=id('search').value.toLowerCase(),st=id('stageFilter').value;return normalize().filter(d=>{const text=(d.name+' '+d.email+' '+d.company+' '+d.status+' '+d.source).toLowerCase();return(!term||text.includes(term))&&(st==='all'||d.stage===st)})}function group(list,key){return list.reduce((a,d)=>(a[d[key]]=(a[d[key]]||0)+1,a),{})}function cards(list){const total=list.reduce((a,d)=>a+d.value,0),weighted=list.reduce((a,d)=>a+d.value*d.probability/100,0),won=list.filter(d=>d.stage==='Closed Won').reduce((a,d)=>a+d.value,0);return'<div class="kpis"><div class="kpi"><span>Total Pipeline</span><strong>'+money(total)+'</strong><em>'+fmt(list.length)+' records</em></div><div class="kpi"><span>Weighted Forecast</span><strong>'+money(weighted)+'</strong><em>probability adjusted</em></div><div class="kpi"><span>Open Deals</span><strong>'+fmt(list.filter(d=>!d.stage.includes('Closed')).length)+'</strong><em>active follow-up</em></div><div class="kpi"><span>Closed Won</span><strong>'+money(won)+'</strong><em>demo revenue</em></div></div>'}
function renderDashboard(){const list=filtered(),stageCounts=group(list,'stage'),sourceCounts=group(list,'source'),prob=[10,20,40,60,80,100].map(p=>({p,count:list.filter(d=>d.probability===p).length})),max=Math.max(...prob.map(b=>b.count),1);id('title').textContent='Deal Dashboards';id('subtitle').textContent=fmt(list.length)+' records • '+money(list.reduce((a,d)=>a+d.value,0))+' total pipeline';let sourceRows=Object.keys(sourceCounts).slice(0,6).map(k=>'<div class="type-row"><strong>'+e(k)+'</strong><div class="track"><div class="fill" style="width:'+Math.max(8,(sourceCounts[k]/Math.max(list.length,1))*100)+'%"></div></div><span>'+sourceCounts[k]+'</span></div>').join('');id('content').innerHTML=cards(list)+'<div class="grid"><section class="panel"><div class="panel-head"><h2>Pipeline by Stage</h2><button class="action" data-explain="pipeline">Explain</button></div><div class="panel-body funnel">'+['Qualified','Needs Analysis','Proposal','Negotiation'].map((s,i)=>'<div class="stage" style="width:'+(96-i*17)+'%;background:'+['#86efac','#67e8f9','#fdba74','#fda4af'][i]+'">'+s+' • '+(stageCounts[s]||0)+'</div>').join('')+'</div></section><section class="panel"><div class="panel-head"><h2>Pipeline by Probability</h2><button class="action" onclick="toast(\'Probability refreshed\')">↻</button></div><div class="panel-body"><div class="bars">'+prob.map((b,i)=>'<div class="bar" style="height:'+Math.max(8,(b.count/max)*100)+'%;background:'+colors[i]+'"><span>'+b.count+'</span><em>'+b.p+'%</em></div>').join('')+'</div></div></section><section class="panel"><div class="panel-head"><h2>Constrava Big Deals</h2><button class="action" data-module="deals">Open</button></div><div class="panel-body"><div class="donut-wrap"><div class="donut"></div><div class="legend">'+list.slice(0,6).map((d,i)=>'<div><i style="background:'+colors[i]+'"></i>'+e(d.company)+' • '+money(d.value)+'</div>').join('')+'</div></div></div></section><section class="panel"><div class="panel-head"><h2>Deals by Type</h2><button class="action" data-module="accounts">Accounts</button></div><div class="panel-body">'+sourceRows+'</div></section></div><section class="panel" style="margin-top:12px"><div class="panel-head"><h2>Deal Pipeline Board</h2><button class="action" data-module="deals">Full board</button></div><div class="panel-body"><div id="board" class="board"></div></div></section>';board('board',list);wire()}
function board(target,list){id(target).innerHTML=['New','Needs Analysis','Qualified','Proposal','Negotiation'].map(s=>{const rows=list.filter(d=>d.stage===s);return'<div class="col"><h3>'+s+' <span>'+rows.length+'</span></h3>'+rows.slice(0,6).map(d=>'<div class="deal"><strong>'+e(d.company)+'</strong><span>'+e(d.name)+' • '+e(d.source)+'</span><em>'+money(d.value)+' / '+d.probability+'%</em></div>').join('')+(rows.length?'':'<div class="deal"><span>No records</span></div>')+'</div>'}).join('')}
function renderRecords(kind){const list=filtered(),title={leads:'Leads',vip:'VIP Leads',contacts:'Contacts',accounts:'Accounts',deals:'Deals',activities:'Activities',home:'CRM Home',feeds:'Feeds',documents:'Documents',more:'Reports'}[kind]||'CRM';id('title').textContent=title;id('subtitle').textContent='Search, filter, view records, and move deals through the sales process.';let main='';if(kind==='deals')main='<div id="fullBoard" class="board"></div>';else if(kind==='activities')main='<div class="activity">'+list.map((d,i)=>'<div class="activity-row"><div class="bubble">'+(i+1)+'</div><div><strong>Follow up with '+e(d.name)+'</strong><span>'+e(d.company)+' • '+e(d.stage)+' • '+e(d.notes)+'</span></div><em>soon</em></div>').join('')+'</div>';else main='<div class="records"><table><thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Status</th><th>Source</th><th>Action</th></tr></thead><tbody>'+list.map(d=>'<tr><td><strong>'+e(kind==='accounts'?d.company:d.name)+'</strong></td><td>'+e(d.email)+'</td><td>'+e(d.company)+'</td><td><span class="pill">'+e(d.stage)+'</span></td><td>'+e(d.source)+'</td><td><button class="action" data-explain="followup">Follow up</button></td></tr>').join('')+'</tbody></table></div>';id('content').innerHTML=cards(list)+'<div class="record-grid"><section class="panel"><div class="panel-head"><h2>'+e(title)+'</h2><button class="action" data-explain="records">Explain</button></div><div class="panel-body">'+main+'</div></section><aside class="panel"><div class="panel-head"><h2>Quick Actions</h2></div><div class="panel-body"><div class="activity"><button class="primary" id="advanceBtn">Advance top lead</button><button class="light" id="localLeadBtn">Add demo lead locally</button><button class="light" data-explain="qualify">Explain lead quality</button><button class="light" data-explain="followup">Draft follow-up strategy</button></div></div></aside></div>';if(kind==='deals')board('fullBoard',list);wire();id('advanceBtn').onclick=()=>{if(data.leads&&data.leads[0]){data.leads[0].status='Qualified';toast('Top lead advanced to Qualified');renderModule(active)}};id('localLeadBtn').onclick=()=>{data.leads.unshift({name:'New Demo Lead',email:'newlead@example.com',company:'Demo Company',status:'New',source:'Manual entry',notes:'Created locally for the CRM demo.',value:2800});toast('Local demo lead added');renderModule(active)}}
function renderModule(m){active=m;document.querySelectorAll('[data-module]').forEach(b=>b.classList.toggle('active',b.dataset.module===m));if(m==='dashboards')renderDashboard();else renderRecords(m)}function explain(topic){const list=filtered(),total=list.reduce((a,d)=>a+d.value,0);const text={pipeline:'Pipeline movement matters more than raw lead count. Watch New → Qualified → Proposal → Negotiation → Closed Won.',followup:'Suggested follow-up: start with Proposal and Qualified leads, ask one direct project question, and offer the most relevant service.',qualify:'A strong lead has a real company, clear source, clear need, and movement past the New stage.',records:'This view turns the CRM from a dashboard into a working record system: filter, search, open accounts, and follow up.',crm:'This CRM overhaul is modeled around sales modules, dashboard components, pipelines, probability, accounts, deals, and activities.'}[topic]||('Current filtered pipeline contains '+fmt(list.length)+' records worth '+money(total)+'.');id('modalBody').textContent=text;id('modal').classList.add('open')}function wire(){document.querySelectorAll('[data-module]').forEach(b=>b.onclick=()=>renderModule(b.dataset.module));document.querySelectorAll('[data-explain]').forEach(b=>b.onclick=()=>explain(b.dataset.explain))}async function refresh(){toast('Refreshing CRM...');try{const r=await fetch('/dashboard/data?token='+encodeURIComponent(token));const j=await r.json();data=j.ok?j:demo();renderModule(active);toast(j.ok?'CRM refreshed':'Using demo preview')}catch(err){data=demo();renderModule(active);toast('Using demo preview')}}async function seed(){toast('Seeding demo data...');try{await fetch('/dashboard/seed?token='+encodeURIComponent(token),{method:'POST'});await refresh()}catch(err){toast('Seed unavailable in preview')}}id('search').addEventListener('input',()=>renderModule(active));id('stageFilter').addEventListener('change',()=>renderModule(active));id('refreshBtn').onclick=refresh;id('seedBtn').onclick=seed;id('explainBtn').onclick=()=>explain('crm');id('addBtn').onclick=()=>{data.leads.unshift({name:'Component Demo',email:'component@example.com',company:'New Component Co',status:'Proposal',source:'Manual entry',notes:'Added from CRM component button.',value:5200});toast('Demo CRM component added');renderDashboard()};id('close').onclick=()=>id('modal').classList.remove('open');id('modal').onclick=ev=>{if(ev.target.id==='modal')id('modal').classList.remove('open')};id('exportBtn').href='/dashboard/export.csv?token='+encodeURIComponent(token);id('jsonBtn').href='/dashboard/data?token='+encodeURIComponent(token);refresh();
</script>
</body>
</html>
